# Hermes sidecar overlay for Baizor AI Platform.
#
# Start manually with:
#   HERMES_API_SERVER_KEY=change-me docker compose -f docker-compose.yml -f docker-compose.hermes.yml up -d
#
# deploy.sh writes HERMES_IMAGE from version.ini:
#   image_name_hermes=ccr.ccs.tencentyun.com/lucky/baizor-hermes
#   hermes_versions=<tag>
#
# The Hermes API server is exposed only inside the Docker network. Add Hermes
# to the platform as an OpenAI-compatible channel with:
#   Base URL: http://baizor-hermes:8642/v1
#   API Key:  ${HERMES_API_SERVER_KEY}

services:
  baizor-hermes:
    image: ${HERMES_IMAGE:-ccr.ccs.tencentyun.com/lucky/baizor-hermes:1.0.27}
    container_name: baizor-hermes
    restart: unless-stopped
    command: ["gateway", "run"]
    expose:
      - "${HERMES_API_SERVER_PORT:-8642}"
    volumes:
      - ./hermes-data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=${HERMES_API_SERVER_PORT:-8642}
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY:?set HERMES_API_SERVER_KEY}
      - HERMES_INFERENCE_BASE_URL=${HERMES_INFERENCE_BASE_URL:-http://new-api:3000/v1}
      - HERMES_INFERENCE_API_KEY=${HERMES_INFERENCE_API_KEY:-}
      - OPENAI_BASE_URL=${HERMES_INFERENCE_BASE_URL:-http://new-api:3000/v1}
      - OPENAI_API_KEY=${HERMES_INFERENCE_API_KEY:-}
      - HERMES_WEIXIN_QR_ENABLED=${HERMES_WEIXIN_QR_ENABLED:-true}
      - HERMES_EXECUTE_CODE_AUTO_APPROVE=${HERMES_EXECUTE_CODE_AUTO_APPROVE:-true}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,new-api,hermes,baizor-hermes,postgres,redis,newapi-postgres,newapi-redis,kimi-agent}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,new-api,hermes,baizor-hermes,postgres,redis,newapi-postgres,newapi-redis,kimi-agent}
    depends_on:
      - new-api
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 8G
        reservations:
          cpus: '1.00'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
    networks:
      - ${HERMES_NETWORK:-new-api-network}
