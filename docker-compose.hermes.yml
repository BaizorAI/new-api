# Hermes sidecar overlay for Baizor AI Platform.
#
# Start manually with:
#   HERMES_API_SERVER_KEY=change-me docker compose -f docker-compose.yml -f docker-compose.hermes.yml up -d
#
# deploy.sh writes HERMES_IMAGE from version.ini:
#   image_name_hermes=ccr.ccs.tencentyun.com/lucky/baizor-hermes
#   hermes_versions=<tag>
#
# The Hermes API server is exposed only inside the Docker network. Add Hermes
# to the platform as an OpenAI-compatible channel with:
#   Base URL: http://hermes:8642/v1
#   API Key:  ${HERMES_API_SERVER_KEY}

services:
  hermes:
    image: ${HERMES_IMAGE:-ccr.ccs.tencentyun.com/lucky/baizor-hermes:1.0.28}
    container_name: hermes
    restart: unless-stopped
    command: ["gateway", "run"]
    expose:
      - "${HERMES_API_SERVER_PORT:-8642}"
    volumes:
      - ./hermes-data:/opt/data
      - ./hermes-agent/skills:/opt/hermes-skills:ro
      - comfyui_output:/opt/data/comfyui-output
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=${HERMES_API_SERVER_PORT:-8642}
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY:?set HERMES_API_SERVER_KEY}
      - HERMES_INFERENCE_BASE_URL=${HERMES_INFERENCE_BASE_URL:-http://new-api:3000/v1}
      - HERMES_INFERENCE_API_KEY=${HERMES_INFERENCE_API_KEY:-}
      - OPENAI_BASE_URL=${HERMES_INFERENCE_BASE_URL:-http://new-api:3000/v1}
      - OPENAI_API_KEY=${HERMES_INFERENCE_API_KEY:-}
      - HERMES_WEIXIN_QR_ENABLED=${HERMES_WEIXIN_QR_ENABLED:-true}
      - HERMES_EXECUTE_CODE_AUTO_APPROVE=${HERMES_EXECUTE_CODE_AUTO_APPROVE:-true}
      # ComfyUI skill: override bundled skills with host source (allows local edits)
      - HERMES_BUNDLED_SKILLS=/opt/hermes-skills
      # ComfyUI server URL: tunnel to anne-1 via host.docker.internal
      - COMFYUI_HOST=${COMFYUI_HOST:-http://host.docker.internal:8188}
      # ComfyUI SCP file transfer back to container
      - COMFYUI_REMOTE_HOST=${COMFYUI_REMOTE_HOST:-218.107.208.58}
      - COMFYUI_REMOTE_PORT=${COMFYUI_REMOTE_PORT:-30022}
      - COMFYUI_REMOTE_USER=${COMFYUI_REMOTE_USER:-sszscd}
      - COMFYUI_REMOTE_OUTPUT_DIR=${COMFYUI_REMOTE_OUTPUT_DIR:-/luckydata/proxy-logs}
      - LOCAL_OUTPUT_DIR=/opt/data/comfyui-output
      - SSH_KEY_FILE=${SSH_KEY_FILE:-/opt/data/.ssh/id_rsa}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,new-api,hermes,postgres,redis,newapi-postgres,newapi-redis,kimi-agent}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,new-api,hermes,postgres,redis,newapi-postgres,newapi-redis,kimi-agent}
    depends_on:
      - new-api
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 8G
        reservations:
          cpus: '1.00'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
    networks:
      - ${HERMES_NETWORK:-new-api-network}

volumes:
  comfyui_output:
